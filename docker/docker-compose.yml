version: '3.8'

services:
  travel-api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: travel-mlops-api:latest
    container_name: travel_mlops_api
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  streamlit-app:
    build:
      context: ..
      dockerfile: docker/Dockerfile.streamlit
    image: travel-mlops-streamlit:latest
    container_name: travel_mlops_streamlit
    ports:
      - "8501:8501"
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    depends_on:
      - travel-api

networks:
  default:
    name: travel_mlops_network
